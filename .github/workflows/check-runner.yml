name: check-runner-quality
run-name: ${{ github.event.head_commit.message }}
on:
  pull_request:
    paths:
      - "check-runner/**"
      - ".github/workflows/check-runner.yml"
jobs:
  test-check-runner:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      # Check that new dependencies are added to the lockfile
      - name: Check lockfile is up to date
        working-directory: ./check-runner
        run: uv lock --check

      - name: Install dependencies, including dev
        working-directory: ./check-runner
        run: uv sync

      - name: Run unit tests
        working-directory: ./check-runner
        run: uv run -m pytest
