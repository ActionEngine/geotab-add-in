services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: .
    command: uvicorn main:app --host 0.0.0.0 --port 8004 --reload --proxy-headers --forwarded-allow-ips="*"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8004:8004"
    restart: unless-stopped
  feeds:
    build:
      context: .
      dockerfile: Dockerfile.feeds
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
  validation:
    build:
      context: .
      dockerfile: Dockerfile.feeds
    command: python run_validation.py
    volumes:
      - .:/app
    restart: unless-stopped
  check-runner:
    build:
      context: ..
      dockerfile: check-runner/Dockerfile
    environment:
      # psycopg2 uses postgresql:// not postgresql+asyncpg://
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
volumes:
  pgdata:
